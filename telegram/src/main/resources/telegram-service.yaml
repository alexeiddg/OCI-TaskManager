apiVersion: v1
kind: Service
metadata:
  name: telegram-service
  annotations:
    oci.oraclecloud.com/loadbalancer-policy: "IP_HASH"
    service.beta.kubernetes.io/oci-load-balancer-shape: "10Mbps"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    app: telegram